services:

  db:
    image: postgres:15
    container_name: api_db
    restart: always
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: api_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: api_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis

  celery:
    build: .
    container_name: api_celery
    command: celery -A core worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis

volumes:
  postgres_data: