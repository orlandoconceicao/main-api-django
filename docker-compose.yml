version: '3.9'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: software_sales_db
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: 577643121Aa.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: django_api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: software_sales_db
      DB_USER: api_user
      DB_PASSWORD: 577643121Aa.
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data: