version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: api_web_prod
    command: gunicorn software_sales.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: api_celery_prod
    command: celery -A software_sales worker -l info
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis