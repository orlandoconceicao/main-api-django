services:
  db:
    image: postgres:15
    container_name: api_db
    restart: always
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: api_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: api_web
    restart: always
    command: sh /app/docker/entrypoint.sh
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis

  celery:
    build: .
    container_name: api_celery
    restart: always
    command: sh /app/docker/entrypoint-celery.sh
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis

volumes:
  postgres_data: