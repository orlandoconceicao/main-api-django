version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: api_web_dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: api_celery_dev
    command: celery -A software_sales worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis