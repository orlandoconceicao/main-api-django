services:
  db:
    image: postgres:15
    container_name: api_db_prod
    restart: always
    environment:
      POSTGRES_DB: software_sales_db
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: 577643121Aa.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: api_redis_prod
    restart: always
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: api_web_prod
    command: gunicorn software_sales.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: api_celery_prod
    command: celery -A software_sales worker -l info
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis

volumes:
  postgres_data: